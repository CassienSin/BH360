<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/BH_Logo.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BH360 – Barangay Holistic 360 Management System" />
    <title>BH360</title>

    <!-- Preconnect to Google Fonts origin (DNS + TLS warm-up) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Non-blocking font load:
      1. media="print" makes the browser fetch it without blocking render.
      2. onload switches media to "all" once the sheet is ready.
      3. <noscript> is the fallback for JS-disabled browsers.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      />
    </noscript>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        width: 100%;
      }

      #root {
        height: 100%;
        width: 100%;
      }

      .bh360-loader {
        height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        pointer-events: none;
      }

      .loader-content {
        text-align: center;
      }

      .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 30px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .loader-text {
        color: white;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .loader-hidden {
        opacity: 0 !important;
        visibility: hidden !important;
        transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="bh360-loader" id="initialLoader">
        <div class="loader-content">
          <div class="spinner"></div>
          <div class="loader-text">Loading BH360...</div>
        </div>
      </div>
    </div>
    <script>
      // Hide the loader once React mounts
      window.hideInitialLoader = function() {
        const loader = document.getElementById('initialLoader');
        if (loader) {
          loader.classList.add('loader-hidden');
        }
      };

      // Force hide loader after 3 seconds as fallback
      setTimeout(() => {
        window.hideInitialLoader();
      }, 3000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
